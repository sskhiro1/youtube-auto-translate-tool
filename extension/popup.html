<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Auto Translator</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header>
        <p class="eyebrow">YouTube subtitles</p>
        <h1>Auto Translator</h1>
      </header>

      <label class="field">
        <span>YouTubeリンク</span>
        <input id="youtubeUrl" type="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off">
      </label>

      <label class="field">
        <span>翻訳先言語</span>
        <input id="languageSearch" type="search" placeholder="日本語 / Japanese / ja" autocomplete="off">
      </label>

      <select id="languageSelect" size="8" aria-label="翻訳先言語"></select>

      <button id="openButton" type="button">開いて自動設定</button>
      <p id="status" role="status"></p>
    </main>

    <script src="languages.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
